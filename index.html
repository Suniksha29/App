<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login &amp; Sign Up</title>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
      <!-- Login: primary view -->
      <section
        id="login-section"
        class="form-box card"
        aria-labelledby="login-heading"
      >
        <h1 id="login-heading" class="form-title">Welcome back</h1>
        <p class="form-subtitle">Sign in to continue</p>

        <div
          id="login-success"
          class="success-message"
          role="status"
          aria-live="polite"
          hidden
        ></div>
        <div
          id="login-submit-error"
          class="submit-error"
          role="alert"
          aria-live="assertive"
          hidden
        ></div>

        <form id="login-form-element" novalidate>
          <div class="form-group">
            <label for="login-email">Email</label>
            <input
              type="email"
              id="login-email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            >
            <span id="login-email-error" class="error-text" role="alert"></span>
          </div>

          <div class="form-group">
            <label for="login-password">Password</label>
            <div class="password-input-wrapper">
              <input
                type="password"
                id="login-password"
                name="password"
                placeholder="Enter your password"
                autocomplete="current-password"
                required
              >
              <button
                type="button"
                class="toggle-password"
                data-target="login-password"
                aria-controls="login-password"
                aria-label="Show password"
                aria-pressed="false"
              >
                <span class="toggle-password__icon toggle-password__icon--show" aria-hidden="true">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 5C7 5 2.73 8.11 1 12c1.73 3.89 6 7 11 7s9.27-3.11 11-7c-1.73-3.89-6-7-11-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z" fill="currentColor"/>
                  </svg>
                </span>
                <span class="toggle-password__icon toggle-password__icon--hide" aria-hidden="true">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 6.5c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.82l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-3.89-6-7-11-7-1.27 0-2.49.18-3.64.5l2.17 2.17c.56-.23 1.17-.36 1.82-.36zM2 4.27l3.28 3.28.45.45C3.08 8.8 1.78 10.25 1 12c1.73 3.89 6 7 11 7 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z" fill="currentColor"/>
                  </svg>
                </span>
              </button>
            </div>
            <span id="login-password-error" class="error-text" role="alert"></span>
          </div>

          <button type="submit" id="login-submit" class="submit-btn" disabled>
            Sign in
          </button>
        </form>

        <p class="form-footer">
          No account?
          <button type="button" class="link-btn" id="go-to-signup">Create one</button>
        </p>
      </section>

      <!-- Sign up -->
      <section
        id="signup-section"
        class="form-box card"
        aria-labelledby="signup-heading"
        hidden
      >
        <h1 id="signup-heading" class="form-title">Create account</h1>
        <p class="form-subtitle">Enter your details to register</p>

        <div
          id="signup-success"
          class="success-message"
          role="status"
          aria-live="polite"
          hidden
        ></div>

        <form id="signup-form-element" novalidate>
          <div class="form-group">
            <label for="signup-name">Full name</label>
            <input
              type="text"
              id="signup-name"
              name="name"
              placeholder="Jane Doe"
              autocomplete="name"
              required
            >
            <span id="signup-name-error" class="error-text" role="alert"></span>
          </div>

          <div class="form-group">
            <label for="signup-email">Email</label>
            <input
              type="email"
              id="signup-email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            >
            <span id="signup-email-error" class="error-text" role="alert"></span>
          </div>

          <div class="form-group">
            <label for="signup-password">Password</label>
            <div class="password-input-wrapper">
              <input
                type="password"
                id="signup-password"
                name="password"
                placeholder="At least 6 characters"
                autocomplete="new-password"
                required
              >
              <button
                type="button"
                class="toggle-password"
                data-target="signup-password"
                aria-controls="signup-password"
                aria-label="Show password"
                aria-pressed="false"
              >
                <span class="toggle-password__icon toggle-password__icon--show" aria-hidden="true">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 5C7 5 2.73 8.11 1 12c1.73 3.89 6 7 11 7s9.27-3.11 11-7c-1.73-3.89-6-7-11-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z" fill="currentColor"/>
                  </svg>
                </span>
                <span class="toggle-password__icon toggle-password__icon--hide" aria-hidden="true">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 6.5c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.82l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-3.89-6-7-11-7-1.27 0-2.49.18-3.64.5l2.17 2.17c.56-.23 1.17-.36 1.82-.36zM2 4.27l3.28 3.28.45.45C3.08 8.8 1.78 10.25 1 12c1.73 3.89 6 7 11 7 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z" fill="currentColor"/>
                  </svg>
                </span>
              </button>
            </div>
            <span id="signup-password-error" class="error-text" role="alert"></span>
          </div>

          <div class="form-group">
            <label for="signup-confirm-password">Confirm password</label>
            <div class="password-input-wrapper">
              <input
                type="password"
                id="signup-confirm-password"
                name="confirmPassword"
                placeholder="Re-enter your password"
                autocomplete="new-password"
                required
              >
              <button
                type="button"
                class="toggle-password"
                data-target="signup-confirm-password"
                aria-controls="signup-confirm-password"
                aria-label="Show password"
                aria-pressed="false"
              >
                <span class="toggle-password__icon toggle-password__icon--show" aria-hidden="true">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 5C7 5 2.73 8.11 1 12c1.73 3.89 6 7 11 7s9.27-3.11 11-7c-1.73-3.89-6-7-11-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z" fill="currentColor"/>
                  </svg>
                </span>
                <span class="toggle-password__icon toggle-password__icon--hide" aria-hidden="true">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 6.5c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.82l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-3.89-6-7-11-7-1.27 0-2.49.18-3.64.5l2.17 2.17c.56-.23 1.17-.36 1.82-.36zM2 4.27l3.28 3.28.45.45C3.08 8.8 1.78 10.25 1 12c1.73 3.89 6 7 11 7 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z" fill="currentColor"/>
                  </svg>
                </span>
              </button>
            </div>
            <span id="signup-confirm-password-error" class="error-text" role="alert"></span>
          </div>

          <button type="submit" id="signup-submit" class="submit-btn" disabled>
            Sign up
          </button>
        </form>

        <p class="form-footer">
          Already registered?
          <button type="button" class="link-btn" id="go-to-login">Sign in</button>
        </p>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
